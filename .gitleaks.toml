# Gitleaks configuration. Extends the upstream default ruleset and adds a
# small allow-list for placeholder values committed to the repo on purpose
# (sample env files, LocalStack credentials, Terraform state-bucket name).
#
# Re-running locally:
#   docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect \
#       --source=/repo --config=/repo/.gitleaks.toml
[extend]
useDefault = true
[allowlist]
description = "Workshop placeholders, LocalStack dummies, and vendored third-party packages"
paths = [
    '''(?i)frontend/\.env\.sample$''',
    '''(?i)README\.md$''',
    '''(?i)SYSTEM_DESIGN\.md$''',
    '''(?i)docs/.*''',
    # Pip-install artifacts under each Lambda service directory. They are no
    # longer tracked (see .gitignore) but ARE present in git HISTORY from
    # earlier commits, and gitleaks scans history by default. The `cryptography`
    # package ships upstream test fixtures (private keys, certificates) that
    # match the default secret regexes but are not project secrets.
    '''(?i)backend/[^/]+-service/annotated_types/.*''',
    '''(?i)backend/[^/]+-service/cffi/.*''',
    '''(?i)backend/[^/]+-service/cryptography/.*''',
    '''(?i)backend/[^/]+-service/jwt/.*''',
    '''(?i)backend/[^/]+-service/psycopg(_binary(\.libs)?)?/.*''',
    '''(?i)backend/[^/]+-service/pycparser/.*''',
    '''(?i)backend/[^/]+-service/pydantic(_core)?/.*''',
    '''(?i)backend/[^/]+-service/[^/]+\.dist-info/.*''',
    '''(?i)backend/[^/]+-service/typing_extensions\.py$''',
]
regexes = [
    # LocalStack ships a fixed dummy access key in every example. Never a real secret.
    '''AKIA[0-9A-Z]{0,4}EXAMPLE''',
    '''(?i)test[_-]?access[_-]?key''',
    # Workshop default Postgres password used only against LocalStack.
    '''postgres123''',
    # Terraform state bucket placeholder used in the default provider config.
    '''coding-workshop-(tfstate-)?[a-z0-9-]*abcd1234''',
]
