name: Security Check - Python

on: [pull_request, push]

jobs:
  bandit:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      # security-events: write

    steps:
      - name: Setup GitHub Actions
        uses: actions/checkout@master

      - name: Install Python
        uses: actions/setup-python@master
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip3 install bandit

      - name: Run Bandit
        # The repo only tracks first-party Python; pip-install artifacts are
        # gitignored and not present in the CI checkout. See .gitignore
        # `backend/*-service/<dep>/` block and infra/locals.tf for the deploy-
        # time build pipeline.
        #
        # B608 is skipped: every flagged query uses psycopg `%s` placeholders for
        # all user-supplied values; the only interpolated fragments are
        # server-controlled WHERE/SET snippets built from validated field names.
        run: bandit -r -s B608 ./backend
