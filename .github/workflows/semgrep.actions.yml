name: Security Check - Semgrep

on: [pull_request, push]

jobs:
  semgrep:
    runs-on: ubuntu-latest
    # Use the official Semgrep image so the same scan runs locally and in CI.
    # `docker run --rm -v "$PWD:/src" returntocorp/semgrep semgrep ci` reproduces this.
    container:
      image: returntocorp/semgrep:latest

    permissions:
      actions: read
      contents: read
      # security-events: write   # uncomment to upload SARIF to GitHub code scanning

    steps:
      - name: Setup GitHub Actions
        uses: actions/checkout@master
        with:
          # Semgrep needs the full history on PRs to diff against the base ref.
          fetch-depth: 0

      - name: Run Semgrep
        # `semgrep ci` auto-picks the right ruleset:
        #   - on PRs: diff-aware scan against the base ref
        #   - on push: full scan with the `auto` config
        # Exits non-zero on findings of severity ERROR (matches the bandit/npm-audit pattern).
        env:
          SEMGREP_RULES: >-
            p/default
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/python
            p/typescript
            p/react
            p/terraform
            p/dockerfile
          # SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}  # optional: enables Semgrep Cloud reporting
        run: semgrep ci --sarif --output=semgrep.sarif

      - name: Upload Semgrep SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: ignore

