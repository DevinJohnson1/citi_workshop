name: Security Check - Semgrep

on: [pull_request, push]

jobs:
  semgrep:
    runs-on: ubuntu-latest
    # Use the official Semgrep image so the same scan runs locally and in CI.
    # `docker run --rm -v "$PWD:/src" returntocorp/semgrep semgrep ci` reproduces this.
    container:
      image: returntocorp/semgrep:latest

    permissions:
      actions: read
      contents: read
      # security-events: write   # uncomment to upload SARIF to GitHub code scanning

    steps:
      - name: Setup GitHub Actions
        uses: actions/checkout@master
        with:
          # Semgrep needs the full history on PRs to diff against the base ref.
          fetch-depth: 0

      - name: Run Semgrep
        # `semgrep ci` auto-picks the right ruleset:
        #   - on PRs: diff-aware scan against the base ref
        #   - on push: full scan with the `auto` config
        # Exits non-zero on findings of severity ERROR (matches the bandit/npm-audit pattern).
        env:
          SEMGREP_RULES: >-
            p/default
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/python
            p/typescript
            p/react
            p/terraform
            p/dockerfile
          # SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}  # optional: enables Semgrep Cloud reporting
        # --exclude-rule justifications (every exclusion below is either a confirmed
        # false-positive class or an AWS/workshop-scope constraint):
        #
        #   * sqlalchemy-execute-raw-query — backend services use psycopg directly,
        #     not SQLAlchemy. The rule fires on every `cur.execute(f"... {where_sql}",
        #     params)` call where `where_sql` is a server-built fragment of validated
        #     column names and all user-supplied values are bound via psycopg %s
        #     placeholders. The rule has no awareness of psycopg parameterization
        #     and produces only false positives here. Same rationale as bandit B608
        #     (skipped in python.actions.yml).
        #
        #   * formatted-sql-query — identical false-positive pattern as above, just
        #     a different rule pack catching the same psycopg %s-parameterized calls.
        #
        #   * using-http-server — only fires on bin/proxy-server.js, which is a
        #     localhost-only LocalStack CORS shim (see file header). It is never
        #     deployed, never exposed beyond 127.0.0.1, and has no production
        #     analogue (AWS CloudFront terminates TLS in real environments).
        #
        #   * aws-insecure-cloudfront-distribution-tls-version — the distribution
        #     uses `cloudfront_default_certificate = true` (the *.cloudfront.net
        #     cert). AWS pins that cert's minimum_protocol_version to TLSv1 and
        #     rejects any override; raising it requires provisioning an ACM cert
        #     bound to a custom domain, which is out of scope for this workshop.
        run: >-
          semgrep ci --sarif --output=semgrep.sarif
          --exclude-rule python.sqlalchemy.security.sqlalchemy-execute-raw-query.sqlalchemy-execute-raw-query
          --exclude-rule python.lang.security.audit.formatted-sql-query.formatted-sql-query
          --exclude-rule problem-based-packs.insecure-transport.js-node.using-http-server.using-http-server
          --exclude-rule terraform.aws.security.aws-cloudfront-insecure-tls.aws-insecure-cloudfront-distribution-tls-version

      - name: Upload Semgrep SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: ignore

